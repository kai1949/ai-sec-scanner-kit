name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to release (example: v0.2.1)'
        required: true
        default: 'v0.2.0'
      publish_npm:
        description: 'Publish to npm'
        required: true
        type: boolean
        default: true
      create_github_release:
        description: 'Create GitHub Release'
        required: true
        type: boolean
        default: true
      push_tag:
        description: 'Create and push tag when manually triggered'
        required: true
        type: boolean
        default: true
      sync_gitee:
        description: 'Sync tag and branch to Gitee mirror'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "release tag is required" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Smoke test
        run: bash scripts/smoke-test.sh

      - name: Ensure tag exists for manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.push_tag == 'true'
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Pack
        id: pack
        shell: bash
        run: |
          TARBALL=$(npm pack --cache /tmp/npm-cache | tail -n1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Resolve npm auth token
        id: npm_auth
        shell: bash
        env:
          SECRET_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SECRET_NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
          VAR_NPM_TOKEN: ${{ vars.NPM_TOKEN }}
          VAR_NODE_AUTH_TOKEN: ${{ vars.NODE_AUTH_TOKEN }}
        run: |
          TOKEN=""
          SOURCE=""

          if [[ -n "${SECRET_NPM_TOKEN:-}" ]]; then
            TOKEN="$SECRET_NPM_TOKEN"
            SOURCE="secrets.NPM_TOKEN"
          elif [[ -n "${SECRET_NODE_AUTH_TOKEN:-}" ]]; then
            TOKEN="$SECRET_NODE_AUTH_TOKEN"
            SOURCE="secrets.NODE_AUTH_TOKEN"
          elif [[ -n "${VAR_NPM_TOKEN:-}" ]]; then
            TOKEN="$VAR_NPM_TOKEN"
            SOURCE="vars.NPM_TOKEN"
          elif [[ -n "${VAR_NODE_AUTH_TOKEN:-}" ]]; then
            TOKEN="$VAR_NODE_AUTH_TOKEN"
            SOURCE="vars.NODE_AUTH_TOKEN"
          fi

          if [[ -z "$TOKEN" ]]; then
            echo "::error::No npm auth token found. Checked secrets.NPM_TOKEN, secrets.NODE_AUTH_TOKEN, vars.NPM_TOKEN, vars.NODE_AUTH_TOKEN."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          printf 'NODE_AUTH_TOKEN=%s\n' "$TOKEN" >> "$GITHUB_ENV"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Resolved npm auth token from $SOURCE"

      - name: Publish to npm
        if: github.event_name == 'push' || github.event.inputs.publish_npm == 'true'
        shell: bash
        run: |
          echo "Using npm auth source: ${{ steps.npm_auth.outputs.source }}"

          set +e
          OUTPUT="$(npm publish --access public 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"

          if [[ $STATUS -ne 0 ]]; then
            if echo "$OUTPUT" | grep -qiE 'ENEEDAUTH|E401|E403|auth|authorization|token'; then
              echo "::error::npm auth failed. Check NPM_TOKEN validity, scope permissions, and 2FA bypass."
            elif echo "$OUTPUT" | grep -qiE 'cannot publish over the previously published versions'; then
              echo "::error::Version already published. Bump package version and retag."
            elif echo "$OUTPUT" | grep -qiE 'You do not have permission to publish|forbidden|scope'; then
              echo "::error::No publish permission for this package name. Use an owned scope/package."
            else
              echo "::error::npm publish failed. Check publish step logs for details."
            fi
            exit $STATUS
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_github_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.pack.outputs.tarball }}
          generate_release_notes: true

      - name: Sync to Gitee mirror (optional)
        if: github.event_name == 'push' || github.event.inputs.sync_gitee == 'true'
        shell: bash
        env:
          GITEE_SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}
          GITEE_REPO_SSH: ${{ secrets.GITEE_REPO_SSH }}
        run: |
          if [[ -z "$GITEE_SSH_PRIVATE_KEY" || -z "$GITEE_REPO_SSH" ]]; then
            echo "Skip Gitee sync: missing GITEE_SSH_PRIVATE_KEY or GITEE_REPO_SSH"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "$GITEE_REPO_SSH"

          TAG="${{ steps.tag.outputs.tag }}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            git push gitee HEAD:refs/heads/main
          fi

          git push gitee "refs/tags/$TAG:refs/tags/$TAG"
